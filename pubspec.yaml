name: eco_driving_app
description: "Application de navigation pour sensibiliser à l'éco conduite"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^7.0.0
  latlong2: ^0.9.0
  geolocator: ^12.0.0
  flutter_map_location_marker: ^9.0.0
  http: ^1.2.0
  flutter_polyline_points: ^2.0.0
  shared_preferences: ^2.3.0
  flutter_tts: ^4.2.1
  fl_chart: ^0.68.0
  table_calendar: ^3.2.0
  wakelock_plus: ^1.2.8

dev_dependencies:
  flutter_launcher_icons: ^0.9.2
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
  assets:
    - lib/logo.png

flutter_icons:
  android: true
  ios: true
  image_path: "lib/logo.png"
